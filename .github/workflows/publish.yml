name: Publish to NuGet.org

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix, e.g. 1.0.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC / Trusted Publishing

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore src/EODHD.CSharpApiClient/EODHD.CSharpApiClient.csproj

      - name: Build
        run: |
          dotnet build src/EODHD.CSharpApiClient/EODHD.CSharpApiClient.csproj \
            -c Release --no-restore \
            -p:Version=${{ steps.version.outputs.value }}

      - name: Pack
        run: |
          dotnet pack src/EODHD.CSharpApiClient/EODHD.CSharpApiClient.csproj \
            -c Release --no-build \
            -p:Version=${{ steps.version.outputs.value }} \
            -o nupkg

      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: Vardan.Tovmasyan

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push nupkg/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate
