name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore EODHD.CSharpApiClient.slnx

      - name: Build (Debug)
        run: dotnet build EODHD.CSharpApiClient.slnx -c Debug --no-restore --nologo

      - name: Build (Release)
        run: dotnet build EODHD.CSharpApiClient.slnx -c Release --no-restore --nologo

      - name: Unit tests
        run: |
          dotnet test tests/EODHD.CSharpApiClient.UnitTests/EODHD.CSharpApiClient.UnitTests.csproj \
            -c Debug --no-build --no-restore --nologo \
            --logger "console;verbosity=normal"

      - name: Verify pack
        run: |
          dotnet pack src/EODHD.CSharpApiClient/EODHD.CSharpApiClient.csproj \
            -c Release --no-build --no-restore --nologo -o ./nupkg
          echo "Produced:" && ls ./nupkg
